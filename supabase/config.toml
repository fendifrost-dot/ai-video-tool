# compose-look-callback is a server-to-server endpoint: CC POSTs the
# rendered pipeline result here after running the async pipeline. There is
# no user JWT to validate at the edge — authentication happens inside the
# function via the X-Proxy-Secret header (shared with CC). Mark it public
# so Supabase doesn't reject CC's requests at the platform layer.
[functions.compose-look-callback]
verify_jwt = false

# faceswap-callback is a server-to-server webhook from CC (which subscribed to
# Fal's webhook for the async face-swap job). Same auth model as
# compose-look-callback: shared X-Proxy-Secret validated inside the function.
[functions.faceswap-callback]
verify_jwt = false

[functions.train-style-lora-proxy]
verify_jwt = false

[functions.train-style-lora-callback]
verify_jwt = false
